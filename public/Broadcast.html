<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WLBT Investigates — Tracking Jackson's Homicides</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --wlbt-red: #c8102e;
    --wlbt-dark: #0a0a0f;
    --ctrl-bg: #13131c;
    --ctrl-border: #2a2a3c;
    --btn-idle: #1e1e2e;
    --btn-active: #c8102e;
    --btn-action: #162040;
    --lower-h: 44px;
    --bar-h: 52px;
  }

  html {
    width: 100%;
    height: 100%;
  }

  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--wlbt-dark);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    user-select: none;
  }

  #shell {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }

  /* ── iframe area ── */
  #iframe-wrap {
    position: relative;
    flex: 1 1 0;
    overflow: hidden;
    min-height: 0;
  }

  /* The iframe is 1.5× taller than its container so the map is visible.
     We shift it up to hide the dashboard's own header, then scale it down
     to fill the wrapper using CSS transform — pure CSS, no JS needed. */
  #dash-frame {
    display: block;
    border: none;
    /* Full native size — we scale it visually */
    width: 100%;
    height: 100%;
  }

  /* ── lower third ── */
  #lower-third {
    height: var(--lower-h);
    background: var(--wlbt-red);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 14px;
    flex-shrink: 0;
    z-index: 10;
  }

  #logo-bug {
    height: 32px;
    width: auto;
    background: #fff;
    padding: 2px 7px;
    border-radius: 2px;
    object-fit: contain;
    flex-shrink: 0;
  }

  #logo-fallback {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 0.06em;
    color: #fff;
    background: #000;
    padding: 3px 9px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  #brand-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #view-dots { display: flex; gap: 5px; flex-shrink: 0; }
  .vdot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    transition: background 0.2s;
  }
  .vdot.on { background: #fff; }

  #refresh-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
  }
  #rdot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transition: background 0.3s;
  }
  #rdot.pulse { background: #fff; animation: blink .7s ease-in-out; }
  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.3; transform:scale(1.5); }
  }

  #live-clock {
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    flex-shrink: 0;
  }

  /* ── control bar ── */
  #ctrl-bar {
    height: var(--bar-h);
    background: var(--ctrl-bg);
    border-top: 1px solid var(--ctrl-border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 7px;
    flex-shrink: 0;
    transition: height .25s ease, opacity .25s ease, padding .25s ease;
    overflow: hidden;
  }
  #ctrl-bar.hidden { height: 0; opacity: 0; padding: 0 12px; pointer-events: none; }

  .btn {
    height: 36px;
    padding: 0 14px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.03em;
    border: 1px solid var(--ctrl-border);
    background: var(--btn-idle);
    color: rgba(255,255,255,.5);
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .btn:active { transform: scale(.97); }
  .btn.on   { background: var(--btn-active); color: #fff; border-color: transparent; }
  .btn.act  { background: var(--btn-action); color: rgba(255,255,255,.85); border-color: #264070; }
  .btn.act:hover { background: #1e3560; }
  .btn.hide { background: transparent; color: rgba(255,255,255,.28); font-size: 11px; }

  .divider { width: 1px; height: 28px; background: var(--ctrl-border); flex-shrink: 0; }
  .spacer  { flex: 1; }

  /* show-controls tab */
  #show-tab {
    position: fixed; bottom: 0; right: 24px;
    height: 26px; padding: 0 14px;
    background: var(--wlbt-red); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
    border-radius: 5px 5px 0 0;
    display: none; align-items: center;
    cursor: pointer; z-index: 200;
    -webkit-tap-highlight-color: transparent;
  }
  #show-tab.vis { display: flex; }

  /* loading overlay */
  #loader {
    position: absolute; inset: 0;
    background: var(--wlbt-dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; z-index: 50;
    transition: opacity .6s ease;
  }
  #loader.gone { opacity: 0; pointer-events: none; }
  .spin {
    width: 42px; height: 42px;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: var(--wlbt-red);
    border-radius: 50%;
    animation: rot .8s linear infinite;
  }
  @keyframes rot { to { transform: rotate(360deg); } }
  #loader p { font-size: 13px; color: rgba(255,255,255,.4); letter-spacing: .07em; text-transform: uppercase; }
</style>
</head>
<body>

<div id="shell">

  <!-- iframe -->
  <div id="iframe-wrap">
    <div id="loader"><div class="spin"></div><p>Loading Dashboard…</p></div>
    <iframe id="frm"
      src="https://homicide-dashboard.netlify.app/"
      title="WLBT Homicide Dashboard"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
    ></iframe>
  </div>

  <!-- lower third -->
  <div id="lower-third">
    <img id="logo-bug" src="" alt="WLBT 3 Investigates"
         onerror="this.style.display='none'">
    <span id="logo-fallback">WLBT3</span>
    <span id="brand-title">WLBT Investigates &nbsp;·&nbsp; Tracking Jackson's Homicides</span>
    <div id="view-dots">
      <div class="vdot on" id="vd0"></div>
      <div class="vdot" id="vd1"></div>
      <div class="vdot" id="vd2"></div>
      <div class="vdot" id="vd3"></div>
      <div class="vdot" id="vd4"></div>
    </div>
    <div id="refresh-hint"><div id="rdot"></div><span id="rlabel">Auto-refresh 5:00</span></div>
    <span id="live-clock">—</span>
  </div>

  <!-- control bar -->
  <div id="ctrl-bar">
    <button class="btn on"  data-v="0" onclick="setView(0)">Map View</button>
    <button class="btn"     data-v="1" onclick="setView(1)">Heatmap</button>
    <button class="btn"     data-v="2" onclick="setView(2)">Charts</button>
    <button class="btn"     data-v="3" onclick="setView(3)">City Ranking</button>
    <button class="btn"     data-v="4" onclick="setView(4)">YTD Count</button>

    <div class="divider"></div>
    <button class="btn act" onclick="goFS()">⛶ Fullscreen</button>
    <button class="btn act" onclick="doRefresh()">↻ Refresh</button>

    <div class="spacer"></div>
    <button class="btn hide" onclick="hideCtrl()">Hide Controls ↓</button>
  </div>
</div>

<div id="show-tab" onclick="showCtrl()">▲ Controls</div>

<script>
// ── URL fragments for each view preset ──────────────────────────────────────
// We reload the iframe to a specific hash. The dashboard's own JS handles
// scrolling to anchors, so no cross-origin DOM access is needed at all.
const BASE = 'https://homicide-dashboard.netlify.app/';

const VIEWS = [
  { hash: '',                label: 'Map View'     },
  { hash: '#map',            label: 'Heatmap'      },
  { hash: '#charts-section', label: 'Charts'       },
  { hash: '#city-compare',   label: 'City Ranking' },
  { hash: '#count-banner',   label: 'YTD Count'    },
];

const frm = document.getElementById('frm');
let curView = 0;

function setView(idx) {
  curView = idx;

  // Update buttons
  document.querySelectorAll('.btn[data-v]').forEach((b, i) =>
    b.classList.toggle('on', i === idx));

  // Update dots
  for (let i = 0; i < 5; i++)
    document.getElementById('vd' + i).classList.toggle('on', i === idx);

  // Navigate iframe to hash — works cross-origin via URL, no DOM access needed
  const url = BASE + VIEWS[idx].hash;
  if (frm.src !== url) frm.src = url;
}

// ── Iframe load ──────────────────────────────────────────────────────────────
frm.addEventListener('load', () => {
  document.getElementById('loader').classList.add('gone');

  // Attempt same-origin CSS injection to hide dashboard chrome for broadcast
  try {
    const doc = frm.contentDocument;
    if (!doc) return;
    const s = doc.createElement('style');
    s.id = 'broadcast-overrides';
    if (doc.getElementById('broadcast-overrides')) return;
    s.textContent = `
      /* Suppress interactive sidebar so map fills width */
      .left-column { display: none !important; }
      .main-content-area { grid-template-columns: 0 1fr !important; }
      /* Hide footer */
      footer, .footer { display: none !important; }
      /* Ensure map div fills */
      #map { width: 100% !important; }
    `;
    doc.head.appendChild(s);

    // Trigger Leaflet map resize so it fills the new width
    setTimeout(() => {
      try {
        const win = frm.contentWindow;
        if (win.map && win.map.invalidateSize) win.map.invalidateSize();
      } catch(e) {}
    }, 300);
  } catch(e) {
    // Cross-origin — silent fallback; iframe still shows full dashboard
  }
});

// ── Clock ────────────────────────────────────────────────────────────────────
function tick() {
  document.getElementById('live-clock').textContent =
    new Date().toLocaleTimeString('en-US');
}
tick(); setInterval(tick, 1000);

// ── Auto-refresh countdown ───────────────────────────────────────────────────
let countdown = 300;
const rlabel = document.getElementById('rlabel');
const rdot   = document.getElementById('rdot');

function doRefresh() {
  countdown = 300;
  rdot.classList.add('pulse');
  setTimeout(() => rdot.classList.remove('pulse'), 800);
  frm.src = BASE + VIEWS[curView].hash;
}

setInterval(() => {
  countdown--;
  const m = Math.floor(countdown / 60);
  const s = String(countdown % 60).padStart(2, '0');
  rlabel.textContent = 'Auto-refresh ' + m + ':' + s;
  if (countdown <= 0) doRefresh();
}, 1000);

// ── Fullscreen ───────────────────────────────────────────────────────────────
// Request fullscreen on the whole shell div, not the iframe —
// this stretches the entire layout to screen edges with no black bars.
function goFS() {
  const el = document.getElementById('shell');
  const fn = el.requestFullscreen || el.webkitRequestFullscreen
           || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (fn) fn.call(el);
}

// When fullscreen is active, make the shell fill it properly
document.addEventListener('fullscreenchange', onFSChange);
document.addEventListener('webkitfullscreenchange', onFSChange);
function onFSChange() {
  const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
  const shell = document.getElementById('shell');
  if (isFS) {
    shell.style.width  = '100vw';
    shell.style.height = '100vh';
    // Notify Leaflet of size change
    try { frm.contentWindow.map.invalidateSize(); } catch(e) {}
  } else {
    shell.style.width  = '';
    shell.style.height = '';
  }
}

// ── Hide / show controls ─────────────────────────────────────────────────────
const ctrlBar = document.getElementById('ctrl-bar');
const showTab = document.getElementById('show-tab');

function hideCtrl() {
  ctrlBar.classList.add('hidden');
  showTab.classList.add('vis');
}
function showCtrl() {
  ctrlBar.classList.remove('hidden');
  showTab.classList.remove('vis');
}

// Double-tap lower third to show controls
let lastTap = 0;
document.getElementById('lower-third').addEventListener('touchend', () => {
  const now = Date.now();
  if (now - lastTap < 350) showCtrl();
  lastTap = now;
});

// ── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '5') setView(+e.key - 1);
  if (e.key === 'f' || e.key === 'F') goFS();
  if (e.key === 'r' || e.key === 'R') doRefresh();
  if (e.key === 'h' || e.key === 'H')
    ctrlBar.classList.contains('hidden') ? showCtrl() : hideCtrl();
});
</script>

</body>
</html>
